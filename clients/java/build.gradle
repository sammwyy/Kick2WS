plugins {
    id 'java-library'
    id 'application'
    id 'maven-publish'
}

group = 'com.sammwy.kick2ws'
version = '0.1.1'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

dependencies {
    api 'com.google.code.gson:gson:2.11.0'
}

application {
    mainClass = 'com.sammwy.kick2ws.Example'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}
